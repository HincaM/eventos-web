<div class="row justify-content-center">
  <div class="col-md-5">
    <h1 class="h3 mb-4">Acceso de administrador</h1>
    <form (submit)="onSubmit($event)" novalidate>
      <div class="mb-3">
        <label class="form-label" for="username">Usuario</label>
        <input id="username" type="text" class="form-control" [formField]="form.username" />
        <ui-form-error [errors]="form.username().errors()" [touched]="form.username().touched()" />
      </div>

      <div class="mb-3">
        <label class="form-label" for="password">Contraseña</label>
        <input id="password" type="password" class="form-control" [formField]="form.password" />
        <ui-form-error [errors]="form.password().errors()" [touched]="form.password().touched()" />
      </div>

      <ui-button type="submit" [loading]="loggingIn()">Iniciar sesión</ui-button>
    </form>
  </div>
</div>
