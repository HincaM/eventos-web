<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="h3 mb-0">Eventos</h1>
  @if (authService.isAuthenticated()) {
    <a class="btn btn-primary" routerLink="/eventos/crear"><i class="fa-solid fa-plus me-1"></i>Crear evento</a>
  }
</div>

<form class="row g-2 align-items-end mb-4" (submit)="onFiltrar($event)" novalidate>
  <div class="col-md-2">
    <label class="form-label" for="filtroTitulo">Título</label>
    <input id="filtroTitulo" type="text" class="form-control" [formField]="form.titulo" />
  </div>
  <div class="col-md-2">
    <label class="form-label" for="filtroTipo">Tipo</label>
    <ui-select id="filtroTipo" [items]="tiposEvento" [codigoFn]="identidad" [descripcionFn]="identidad" placeholder="Todos" [formField]="form.tipo" />
  </div>
  <div class="col-md-2">
    <label class="form-label" for="filtroEstado">Estado</label>
    <ui-select id="filtroEstado" [items]="estadosEvento" [codigoFn]="identidad" [descripcionFn]="identidad" placeholder="Todos" [formField]="form.estado" />
  </div>
  <div class="col-md-2">
    <label class="form-label" for="filtroVenue">Venue</label>
    <ui-select id="filtroVenue" [items]="venues()" [codigoFn]="venueCodigo" [descripcionFn]="venueDescripcion" placeholder="Todos" [formField]="form.venueId" />
  </div>
  <div class="col-md-3">
    <ui-date-range-picker label="Rango de inicio" (rangoCambiado)="onRangoFechas($event)" />
  </div>
  <div class="col-md-1">
    <ui-button type="submit">Filtrar</ui-button>
  </div>
</form>

@if (eventos(); as eventos) {
  @if (eventos.length === 0) {
    <p class="text-muted">No se encontraron eventos con los filtros seleccionados.</p>
  } @else {
    <div class="row g-3">
      @for (evento of eventos; track evento.id) {
        <div class="col-md-4">
          <evento-card [evento]="evento" />
        </div>
      }
    </div>
  }
} @else {
  <ui-spinner />
}
